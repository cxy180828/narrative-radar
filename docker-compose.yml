version: "3.8"

services:
  radar:
    build: .
    container_name: narrative-radar
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
