# ========================================
# Narrative Radar v2 Configuration
# ========================================

# --- Scanning ---
scan:
  interval: 45                # seconds between scans (给GMGN数据更多刷新时间)
  active_hours_interval: 30   # shorter interval during active hours (UTC 12:00-04:00)
  quiet_hours_interval: 60    # longer interval during quiet hours
  chains: ["eth", "bsc", "base", "sol"]

# --- Thresholds ---
thresholds:
  # NOTE 2026-05-18: aligned with pump.fun bonding curve where mc/liq ratio ≈ 10:1.
  # Old values (min_mc=1000, min_liq=500) silently rejected ~99.99% of candidates
  # because pump.fun early tokens with mc=$2k typically only have liq=$200.
  min_market_cap: 2000
  max_market_cap: 100000000    # 1亿 (raised from 10M to capture mid-cap movers like KOGE/AIO)
  min_liquidity: 200           # matches pump.fun's mc/liq ratio
  min_liq_mc_ratio: 0.03       # liquidity / market_cap minimum
  max_top10_holder_pct: 0.80   # top 10 holders max percentage
  min_age_minutes: 1           # 3→1: pump.fun strongest momentum is in first few minutes
  max_sell_tax: 0.10           # max acceptable sell tax
  max_buy_tax: 0.10            # max acceptable buy tax

# --- Momentum ---
momentum:
  consecutive_up: 2            # consecutive rising rounds to trigger (3→2, GMGN数据刷新慢)
  min_pct_gain: 3.0            # minimum % gain to trigger (5→3, 降低门槛)
  push_cooldown: 180           # seconds between pushes for same token (300→180)
  max_snapshots: 20            # max snapshots to keep per token
  stale_timeout: 900           # seconds before removing stale tracker (600→900, 保留更久)
  max_alerts_per_round: 8      # max alerts to push per scan round
  min_snapshot_interval: 20    # minimum seconds between snapshots for same token

# --- Scoring ---
scoring:
  gain_weight: 3.0             # multiplier for % gain (2.5→3.0)
  gain_max: 35
  streak_base: 12              # base score for meeting streak threshold (10→12)
  streak_per_round: 5
  streak_max: 25
  repeat_signal_weight: 5
  repeat_signal_max: 15
  volume_up_bonus: 8           # (10→8, 稍微降低)
  chg_1h_divisor: 3
  chg_1h_max: 8
  liq_ratio_multiplier: 40
  liq_ratio_max: 4
  young_age_bonus: 3           # < 6h
  medium_age_bonus: 1          # < 24h
  category_musk_trump_bonus: 3
  category_binance_cz_bonus: 3
  category_celebrity_bonus: 2
  social_link_bonus: 2
  ai_narrative_bonus: 3        # AI detected meaningful narrative

# --- Push levels ---
push:
  high_score_threshold: 65     # immediate push + AI enhanced message (75→65)
  medium_score_threshold: 30   # batch push (50→30, 大幅降低)
  low_score_threshold: 0       # log only, no push

# --- Paper Trading (虚拟盘) ---
# 启用后，每条已推送的信号会触发一笔模拟买入，并按金字塔策略自动减仓。
# 全部为内存/SQLite 模拟，绝不下真单，也不调用任何下单 API。
paper_trading:
  enabled: true                # 总开关。先用 false 观察日志再切到 true。
  initial_capital: 10000       # 仅用于报告里显示的"账户净值"基准
  position_size: 50            # 每笔买入的虚拟金额 (USD)
  max_concurrent_positions: 10 # 最多同时持仓数量；满了不再开新仓
  min_score_to_buy: 50         # 评分阈值。推送阈值是 30 (medium) 但买入需 50+
  base_slippage: 0.03          # 基础滑点。实际取 max(base, position_size/liq)
  fee: 0.005                   # 单边手续费 (0.5%)
  pre_breakeven_stop_loss: -50 # "翻倍出本"前的止损线，单位 %。设 null 关闭。
  exit_ladder:                 # 金字塔减仓阶梯，按 trigger_pnl 升序触发
    - trigger_pnl: 100         # +100% -> 卖 50% (回收本金)
      sell_pct: 50
    - trigger_pnl: 200         # +200% -> 再卖剩余 30%
      sell_pct: 30
    - trigger_pnl: 400         # +400% -> 再卖剩余 30%
      sell_pct: 30
    - trigger_pnl: 800         # +800% -> 大幅减仓剩余 50%
      sell_pct: 50
  daily_loss_circuit_breaker: 300  # 24h 实现亏损 ≥ 此值则停手 24h

# --- AI ---
ai:
  enabled: true

  # Provider priority: tried in order. First available provider wins.
  # Supports ANY OpenAI-compatible API endpoint.
  # 
  # For relay/proxy stations (中转站):
  #   Just set base_url to your relay endpoint and use the relay's API key.
  #   Examples: one-api, new-api, chat-next-web relay, etc.
  #
  # For each provider you can set:
  #   name:              Display name (for logs/status)
  #   base_url:          API endpoint (must be OpenAI-compatible /chat/completions)
  #   model:             Model name to request
  #   api_key_env:       Environment variable name containing the API key
  #   api_key:           Or directly put the key here (less secure, env var preferred)
  #   max_rpm:           Rate limit - max requests per minute
  #   max_rpd:           Rate limit - max requests per day
  #   priority:          Lower = tried first (default: order in list)
  #   timeout:           Request timeout in seconds (default: 30)
  #   tags:              List of tags for task routing ["fast", "cheap", "smart"]
  #   extra_headers:     Additional HTTP headers (e.g., OpenRouter needs HTTP-Referer)
  #   supports_json_mode: Whether the API supports response_format json_object (default: true)
  #
  providers:
    # === 中转站示例 (Relay Station) ===
    # 如果你有中转站，放在第一位作为主力
    # - name: relay-main
    #   base_url: "https://your-relay.example.com/v1"
    #   model: "gpt-4o-mini"
    #   api_key_env: "RELAY_API_KEY"
    #   max_rpm: 60
    #   max_rpd: 10000
    #   priority: 0
    #   timeout: 30
    #   tags: ["smart", "fast"]

    # === 中转站备用 (Relay Backup) ===
    # - name: relay-backup
    #   base_url: "https://backup-relay.example.com/v1"
    #   model: "claude-3-haiku"
    #   api_key_env: "RELAY_BACKUP_KEY"
    #   max_rpm: 30
    #   max_rpd: 5000
    #   priority: 1
    #   tags: ["smart"]

    # === 免费/低价直连 (Official Free/Cheap) ===
