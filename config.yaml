  # When to use AI
  narrative_analysis: true      # AI for tokens that keywords can't classify
  description_grading: true     # AI to grade token description quality
  enhanced_copywriting: true    # AI for high-score signal messages
  hotword_discovery: true       # AI every 6h to find new trends
  daily_summary: true           # AI daily market summary
  false_positive_learning: true # AI to analyze false positives

# --- Telegram ---
telegram:
  token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TG_CHAT_ID"
  bot_commands: true            # enable /status /pause /filter etc.
  polling_interval: 2           # seconds between checking for commands

# --- HTTP ---
http:
  timeout: 15
  retries: 3
  backoff_factor: 1.0
  status_forcelist: [429, 500, 502, 503, 504]
  ua_rotation: true
  random_delay_min: 0.3
  random_delay_max: 1.5

# --- Logging ---
logging:
  level: "INFO"
  max_bytes: 10485760          # 10MB
  backup_count: 5
  json_format: true

# --- Database ---
database:
  wal_mode: true
  busy_timeout: 5000
  backup_interval: 86400       # daily backup

# --- Backtest / Performance tracking ---
backtest:
  track_intervals: [5, 15, 60, 240, 1440]  # minutes after push to check price
  win_threshold: 10.0          # % gain to count as "win"
  report_interval: 86400       # daily report
