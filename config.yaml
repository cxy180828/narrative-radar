# ========================================
# Narrative Radar v2 Configuration
# ========================================

# --- Scanning ---
scan:
  interval: 30                # seconds between scans
  active_hours_interval: 20   # shorter interval during active hours (UTC 12:00-04:00)
  quiet_hours_interval: 60    # longer interval during quiet hours
  chains: ["eth", "bsc", "base", "sol"]

# --- Thresholds ---
thresholds:
  min_market_cap: 1000
  max_market_cap: 10000000
  min_liquidity: 500
  min_liq_mc_ratio: 0.03       # liquidity / market_cap minimum
  max_top10_holder_pct: 0.80   # top 10 holders max percentage
  min_age_minutes: 10          # minimum token age before considering
  max_sell_tax: 0.10           # max acceptable sell tax
  max_buy_tax: 0.10            # max acceptable buy tax

# --- Momentum ---
momentum:
  consecutive_up: 3            # consecutive rising rounds to trigger
  min_pct_gain: 5.0            # minimum % gain to trigger
  push_cooldown: 300           # seconds between pushes for same token
  max_snapshots: 20            # max snapshots to keep per token
  stale_timeout: 600           # seconds before removing stale tracker
  max_alerts_per_round: 8      # max alerts to push per scan round

# --- Scoring ---
scoring:
  gain_weight: 2.5             # multiplier for % gain
  gain_max: 35
  streak_base: 10
  streak_per_round: 5
  streak_max: 25
  repeat_signal_weight: 5
  repeat_signal_max: 15
  volume_up_bonus: 10
  chg_1h_divisor: 3
  chg_1h_max: 8
  liq_ratio_multiplier: 40
  liq_ratio_max: 4
  young_age_bonus: 3           # < 6h
  medium_age_bonus: 1          # < 24h
  category_musk_trump_bonus: 3
  category_binance_cz_bonus: 3
  category_celebrity_bonus: 2
  social_link_bonus: 2
  ai_narrative_bonus: 3        # AI detected meaningful narrative

# --- Push levels ---
push:
  high_score_threshold: 75     # immediate push + AI enhanced message
  medium_score_threshold: 50   # batch push every 5 minutes
  low_score_threshold: 0       # log only, no push

# --- AI ---
ai:
  enabled: true

  # Provider priority: tried in order. First available provider wins.
  # Supports ANY OpenAI-compatible API endpoint.
  # 
  # For relay/proxy stations (中转站):
  #   Just set base_url to your relay endpoint and use the relay's API key.
  #   Examples: one-api, new-api, chat-next-web relay, etc.
  #
  # For each provider you can set:
  #   name:              Display name (for logs/status)
  #   base_url:          API endpoint (must be OpenAI-compatible /chat/completions)
  #   model:             Model name to request
  #   api_key_env:       Environment variable name containing the API key
  #   api_key:           Or directly put the key here (less secure, env var preferred)
  #   max_rpm:           Rate limit - max requests per minute
  #   max_rpd:           Rate limit - max requests per day
  #   priority:          Lower = tried first (default: order in list)
  #   timeout:           Request timeout in seconds (default: 30)
  #   tags:              List of tags for task routing ["fast", "cheap", "smart"]
  #   extra_headers:     Additional HTTP headers (e.g., OpenRouter needs HTTP-Referer)
  #   supports_json_mode: Whether the API supports response_format json_object (default: true)
  #
  providers:
    # === 中转站示例 (Relay Station) ===
    # 如果你有中转站，放在第一位作为主力
    # - name: relay-main
    #   base_url: "https://your-relay.example.com/v1"
    #   model: "gpt-4o-mini"
    #   api_key_env: "RELAY_API_KEY"
    #   max_rpm: 60
    #   max_rpd: 10000
    #   priority: 0
    #   timeout: 30
    #   tags: ["smart", "fast"]

    # === 中转站备用 (Relay Backup) ===
    # - name: relay-backup
    #   base_url: "https://backup-relay.example.com/v1"
    #   model: "claude-3-haiku"
    #   api_key_env: "RELAY_BACKUP_KEY"
    #   max_rpm: 30
    #   max_rpd: 5000
    #   priority: 1
    #   tags: ["smart"]

    # === 免费/低价直连 (Official Free/Cheap) ===
    - name: groq
      base_url: "https://api.groq.com/openai/v1"
      model: "llama-3.3-70b-versatile"
      api_key_env: "GROQ_API_KEY"
      max_rpm: 28
      max_rpd: 14000
      priority: 2
      tags: ["fast", "free"]

    - name: deepseek
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      api_key_env: "DEEPSEEK_API_KEY"
      max_rpm: 60
      max_rpd: 100000
      priority: 3
      timeout: 30
      tags: ["cheap", "smart"]

    - name: gemini
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
      model: "gemini-2.0-flash"
      api_key_env: "GEMINI_API_KEY"
      max_rpm: 14
      max_rpd: 900
      priority: 4
      tags: ["free"]

    # === OpenRouter (聚合器，支持100+模型) ===
    # - name: openrouter
    #   base_url: "https://openrouter.ai/api/v1"
    #   model: "meta-llama/llama-3.3-70b-instruct"
    #   api_key_env: "OPENROUTER_API_KEY"
    #   max_rpm: 60
    #   max_rpd: 50000
