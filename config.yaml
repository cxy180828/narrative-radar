      base_url: "https://api.groq.com/openai/v1"
      model: "llama-3.3-70b-versatile"
      api_key_env: "GROQ_API_KEY"
      max_rpm: 28
      max_rpd: 14000
      priority: 2
      tags: ["fast", "free"]

    - name: deepseek
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      api_key_env: "DEEPSEEK_API_KEY"
      max_rpm: 60
      max_rpd: 100000
