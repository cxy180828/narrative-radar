    #   priority: 6
    #   tags: ["fast", "cheap"]

    # === OpenAI 官方 ===
    # - name: openai
    #   base_url: "https://api.openai.com/v1"
    #   model: "gpt-4o-mini"
    #   api_key_env: "OPENAI_API_KEY"
    #   max_rpm: 60
